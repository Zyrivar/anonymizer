name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Основная задача: Linux + Qt5 из apt. Быстрая и стабильная.
  linux:
    name: Ubuntu (Qt5, gcc)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update
          # qttools5-dev-tools даёт lrelease/lupdate (нужны для embed_translations);
          # в qtbase5-dev-tools их нет.
          sudo apt-get install -y qtbase5-dev qtbase5-dev-tools qttools5-dev-tools g++ make
          export QT_SELECT=qt5
          qmake --version
          lrelease -version

      - name: Build
        run: |
          export QT_SELECT=qt5
          qmake
          make -j$(nproc)

      - name: Test (unit + e2e)
        run: |
          export QT_SELECT=qt5
          make check

  # Совпадает с рабочим окружением разработчика: Windows + MinGW.
  windows:
    name: Windows (Qt 5.15.2, MinGW 64-bit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 5.15.2 + MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_mingw81
          tools: 'tools_mingw90'
          add-tools-to-path: true
          cache: true

      - name: Build
        shell: cmd
        run: |
          qmake
          mingw32-make -j2

      - name: Test (unit + e2e)
        shell: cmd
        run: mingw32-make check

      # Готовое приложение: anonctl.exe + Qt DLL/плагины + рантайм MinGW.
      # Без флага --release: он на этой версии windeployqt ломает поиск плагина
      # платформы. Рантайм MinGW подхватывается из PATH автоматически.
      # UI-перевод (ru) встроен в ресурсы exe, поэтому Qt-переводы не нужны.
      - name: Package anonctl (standalone)
        shell: cmd
        run: |
          mkdir dist
          copy gui\release\anonctl.exe dist\
          windeployqt --no-translations dist\anonctl.exe

      - name: Upload anonctl artifact
        uses: actions/upload-artifact@v4
        with:
          name: anonctl-windows-x64
          path: dist
          if-no-files-found: error
